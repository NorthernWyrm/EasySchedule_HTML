        /**
         * Create layout strip from stripboard data
         */
        function createLayoutStrip(strip, yMm) {
            const layoutStrip = {
                stripId: strip.id,
                stripType: strip.type,
                xMm: 0,
                yMm: yMm,
                widthMm: LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM,
                heightMm: LAYOUT_CONSTANTS.STRIP_HEIGHT_MM,
                backgroundColorRgb: getStripColorRgb(strip),
                textColorRgb: [0, 0, 0], // Default black text
                columns: []
            };
            
            // Build columns based on strip type
            if (strip.type === 'scene') {
                layoutStrip.columns = createSceneColumns(strip);
            } else if (strip.type === 'banner') {
                layoutStrip.columns = createBannerColumns(strip);
            } else if (strip.type === 'daybreak') {
                layoutStrip.columns = createDaybreakColumns(strip);
                layoutStrip.textColorRgb = [255, 255, 255]; // White text on black
            }
            
            return layoutStrip;
        }

        /**
         * Format time of day to always be uppercase
         */
        function formatTimeOfDay(timeOfDay) {
            return (timeOfDay || '').toUpperCase();
        }

        /**
         * Format banner description - capitalize and provide default if empty
         */
        function formatBannerDescription(description) {
            const text = description && description.trim() !== '' ? description : 'Banner';
            // Make it all UPPERCASE
            return text.toUpperCase();
        }

        /**
         * Create columns for scene strip
         */
        function createSceneColumns(strip) {
            // Wrap cast numbers horizontally based on column width
            const castText = wrapCastNumbers(strip.cast || [], COLUMN_LAYOUT.CAST.widthMm);
            
            return [
                {
                    columnName: 'scene_number',
                    xMm: COLUMN_X_POSITIONS.SCENE_NUMBER,
                    widthMm: COLUMN_LAYOUT.SCENE_NUMBER.widthMm,
                    text: strip.sceneNumber || '',
                    alignment: COLUMN_LAYOUT.SCENE_NUMBER.align,
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                    fontWeight: 'bold'
                },
                {
                    columnName: 'int_ext_daynight',
                    xMm: COLUMN_X_POSITIONS.INT_EXT_DAYNIGHT,
                    widthMm: COLUMN_LAYOUT.INT_EXT_DAYNIGHT.widthMm,
                    text: `${(strip.intExt || '').toUpperCase()}\n${formatTimeOfDay(strip.timeOfDay)}`,
                    alignment: COLUMN_LAYOUT.INT_EXT_DAYNIGHT.align,
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                    fontWeight: 'normal'
                },
                {
                    columnName: 'set_description',
                    xMm: COLUMN_X_POSITIONS.SET_DESCRIPTION,
                    widthMm: COLUMN_LAYOUT.SET_DESCRIPTION.widthMm,
                    text: `${strip.setName || ''}\n[ITALIC]${strip.description || ''}[/ITALIC]`, // Markup for italics
                    alignment: COLUMN_LAYOUT.SET_DESCRIPTION.align,
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                    fontWeight: 'normal'
                },
                {
                    columnName: 'cast',
                    xMm: COLUMN_X_POSITIONS.CAST,
                    widthMm: COLUMN_LAYOUT.CAST.widthMm,
                    text: castText,
                    alignment: COLUMN_LAYOUT.CAST.align,
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                    fontWeight: 'normal'
                    // Removed useCircles flag - cast column now uses plain text
                },
                {
                    columnName: 'location',
                    xMm: COLUMN_X_POSITIONS.LOCATION,
                    widthMm: COLUMN_LAYOUT.LOCATION.widthMm,
                    text: strip.location || '',
                    alignment: COLUMN_LAYOUT.LOCATION.align,
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                    fontWeight: 'normal'
                },
                {
                    columnName: 'pages',
                    xMm: COLUMN_X_POSITIONS.PAGES,
                    widthMm: COLUMN_LAYOUT.PAGES.widthMm,
                    text: `${strip.sceneLengthWhole || 0} ${strip.sceneLengthFraction || 0}/8`,
                    alignment: COLUMN_LAYOUT.PAGES.align,
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                    fontWeight: 'normal'
                },
                {
                    columnName: 'est_time',
                    xMm: COLUMN_X_POSITIONS.EST_TIME,
                    widthMm: COLUMN_LAYOUT.EST_TIME.widthMm,
                    text: formatMinutesToTime(strip.estTime || 0),
                    alignment: COLUMN_LAYOUT.EST_TIME.align,
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                    fontWeight: 'normal'
                }
            ];
        }

        /**
         * Wrap cast numbers horizontally based on column width
         * Example: [1, 2, 3, 4, 5, 6] with narrow column → "1 2 3\n4 5 6"
         * 
         * @param {Array} castArray - Array of cast numbers
         * @param {number} columnWidthMm - Column width in mm
         * @returns {string} Cast numbers with \n line breaks where needed
         */
        function wrapCastNumbers(castArray, columnWidthMm) {
            if (!castArray || castArray.length === 0) return '';
            
            const lines = [];
            let currentLine = [];
            
            castArray.forEach((castNum, idx) => {
                // Try adding this cast number to current line
                const testLine = [...currentLine, castNum].join(' ');
                const testWidth = measureTextWidthMm(testLine, LAYOUT_CONSTANTS.FONT_SIZE_MM, 'normal');
                
                if (testWidth <= columnWidthMm) {
                    // Fits - add to current line
                    currentLine.push(castNum);
                } else {
                    // Doesn't fit - start new line
                    if (currentLine.length > 0) {
                        lines.push(currentLine.join(' '));
                    }
                    currentLine = [castNum];
                }
            });
            
            // Add final line
            if (currentLine.length > 0) {
                lines.push(currentLine.join(' '));
            }
            
            return lines.join('\n');
        }

        /**
         * Create columns for banner strip
         */
        function createBannerColumns(strip) {
            const hasLocation = strip.location && strip.location.trim() !== '';
            const bannerText = formatBannerDescription(strip.description);
            
            if (hasLocation) {
                // Location is set - show description spanning to Pages column, then Location and Est.Time
                return [
                    {
                        columnName: 'banner_description',
                        xMm: COLUMN_X_POSITIONS.SCENE_NUMBER,
                        widthMm: COLUMN_X_POSITIONS.LOCATION - COLUMN_X_POSITIONS.SCENE_NUMBER, // Span through Scene#, INT/EXT, Set/Desc, Cast, and Location column start
                        text: bannerText,
                        alignment: 'left',
                        fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_MM,
                        fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_PT,
                        fontWeight: 'bold'
                    },
                    {
                        columnName: 'banner_location',
                        xMm: COLUMN_X_POSITIONS.LOCATION,
                        widthMm: COLUMN_LAYOUT.LOCATION.widthMm + COLUMN_LAYOUT.PAGES.widthMm, // Span Location + Pages columns
                        text: strip.location || '',
                        alignment: 'left',
                        fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_MM,
                        fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_PT,
                        fontWeight: 'bold'
                    },
                    {
                        columnName: 'banner_est_time',
                        xMm: COLUMN_X_POSITIONS.EST_TIME,
                        widthMm: COLUMN_LAYOUT.EST_TIME.widthMm,
                        text: formatMinutesToTime(strip.estTime || 0),
                        alignment: 'center',
                        fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_MM,
                        fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_PT,
                        fontWeight: 'bold'
                    }
                ];
            } else {
                // No location - just show description spanning full width
                return [{
                    columnName: 'banner_description',
                    xMm: 0,
                    widthMm: LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM,
                    text: bannerText,
                    alignment: 'left',
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_PT,
                    fontWeight: 'bold'
                }];
            }
        }

        /**
         * Create columns for daybreak strip
         */
        function createDaybreakColumns(strip) {
            const metrics = getMetricsForDaybreak(strip.id);
            const dayDate = calculateDayDate(metrics.dayIndex);
            const pages = formatPages(metrics.pages);
            const callTime12 = formatTime12Hour(metrics.callTime);
            const wrapTime12 = formatTime12Hour(metrics.wrapTime);
            
            const daybreakText = `END OF SHOOTING DAY ${metrics.dayIndex} of ${dayMetrics.length} | ${dayDate} | ${pages} pages | ${callTime12} to ${wrapTime12}`;
            
            return [{
                columnName: 'daybreak',
                xMm: 0,
                widthMm: LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM,
                text: daybreakText,
                alignment: 'center',
                fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_MM,
                fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_LARGE_PT,
                fontWeight: 'bold'
            }];
        }

        /**
         * Get RGB color for strip based on type and time of day
         */
        function getStripColorRgb(strip) {
            if (strip.type === 'daybreak') {
                return [0, 0, 0]; // Black
            }
            
            if (strip.type === 'banner') {
                const bannerColors = {
                    beige: [245, 245, 220],
                    lavender: [230, 230, 250],
                    salmon: [250, 128, 114]
                };
                return bannerColors[strip.bannerColor] || bannerColors.beige;
            }
            
            // Scene strips - color based on intExt + timeOfDay
            const colorKey = `${strip.timeOfDay || 'day'}_${strip.intExt || 'int'}`.toLowerCase();
            const stripColors = {
                'dawn_int': [255, 182, 193],
                'dawn_ext': [255, 182, 193],
                'day_int': [255, 255, 255],
                'day_ext': [255, 255, 153],
                'dusk_int': [255, 165, 0],
                'dusk_ext': [255, 165, 0],
                'night_int': [135, 206, 235],
                'night_ext': [34, 139, 34]
            };
            
            return stripColors[colorKey] || [255, 255, 255]; // Default white
        }

        /**
         * Add page number element to page
         */
        function addPageNumber(page, currentPageNum, totalPages) {
            page.pageNumberElement = {
                text: `Page ${currentPageNum} of ${totalPages}`,
                xMm: LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM - 30, // Bottom-right
                yMm: LAYOUT_CONSTANTS.PRINTABLE_HEIGHT_MM - 3,
                fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                fontWeight: 'normal'
            };
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // TEXT MEASUREMENT & TRUNCATION
        // Phase 2: Measure text width and apply ellipsis when needed
        // ═══════════════════════════════════════════════════════════════════════════

        // Create a temporary canvas for text measurement
        let measurementCanvas = null;
        let measurementContext = null;

        function initMeasurementCanvas() {
            if (!measurementCanvas) {
                measurementCanvas = document.createElement('canvas');
                measurementContext = measurementCanvas.getContext('2d');
            }
            return measurementContext;
        }

        /**
         * Measure text width in millimeters
         * 
         * @param {string} text - Text to measure
         * @param {number} fontSizeMm - Font size in millimeters
         * @param {string} fontWeight - 'normal' or 'bold'
         * @returns {number} Width in millimeters
         */
        function measureTextWidthMm(text, fontSizeMm, fontWeight = 'normal') {
            const ctx = initMeasurementCanvas();
            
            // Convert mm to pixels for canvas measurement
            // Using 96 DPI: 1mm = 96/25.4 pixels = 3.7795 pixels
            const fontSizePx = fontSizeMm * 3.7795;
            
            // Set font for measurement
            ctx.font = `${fontWeight} ${fontSizePx}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
            
            // Measure text width in pixels
            const metrics = ctx.measureText(text);
            const widthPx = metrics.width;
            
            // Convert back to millimeters
            const widthMm = widthPx / 3.7795;
            
            return widthMm;
        }

        /**
         * Truncate text with ellipsis if it exceeds max width
         * 
         * @param {string} text - Text to truncate
         * @param {number} maxWidthMm - Maximum width in millimeters
         * @param {number} fontSizeMm - Font size in millimeters
         * @param {string} fontWeight - 'normal' or 'bold'
         * @returns {string} Truncated text with '...' if needed
         */
        function truncateWithEllipsis(text, maxWidthMm, fontSizeMm, fontWeight = 'normal') {
            if (!text) return '';
            
            // Measure full text
            const fullWidth = measureTextWidthMm(text, fontSizeMm, fontWeight);
            
            // If it fits, return as-is
            if (fullWidth <= maxWidthMm) {
                return text;
            }
            
            // Text is too long - need to truncate with ellipsis
            const ellipsis = '...';
            const ellipsisWidth = measureTextWidthMm(ellipsis, fontSizeMm, fontWeight);
            const availableWidth = maxWidthMm - ellipsisWidth;
            
            // Binary search for maximum characters that fit
            let left = 0;
            let right = text.length;
            let bestFit = 0;
            
            while (left <= right) {
                const mid = Math.floor((left + right) / 2);
                const substring = text.substring(0, mid);
                const width = measureTextWidthMm(substring, fontSizeMm, fontWeight);
                
                if (width <= availableWidth) {
                    bestFit = mid;
                    left = mid + 1;
                } else {
                    right = mid - 1;
                }
            }
            
            return text.substring(0, bestFit) + ellipsis;
        }

        /**
         * Apply text truncation to all columns in layout model
         * Modifies layout model in place
         * 
         * @param {Array} pageLayoutModel - Layout model to process
         */
        function applyTextTruncation(pageLayoutModel) {
            pageLayoutModel.forEach(page => {
                page.strips.forEach(strip => {
                    strip.columns.forEach(column => {
                        // Handle multi-line text (e.g., "INT\nDAY" or "Set Name\nDescription")
                        if (column.text.includes('\n')) {
                            const lines = column.text.split('\n');
                            const truncatedLines = lines.map(line => 
                                truncateWithEllipsis(
                                    line, 
                                    column.widthMm, 
                                    column.fontSizeMm, 
                                    column.fontWeight
                                )
                            );
                            column.text = truncatedLines.join('\n');
                        } else {
                            // Single line text
                            column.text = truncateWithEllipsis(
                                column.text,
                                column.widthMm,
                                column.fontSizeMm,
                                column.fontWeight
                            );
                        }
                    });
                });
            });
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // CANVAS PREVIEW RENDERER
        // Phase 3: Render layout model to HTML canvas elements
        // ═══════════════════════════════════════════════════════════════════════════

        /**
         * Render preview pages to canvas elements
         * 
         * @param {Array} pageLayoutModel - Layout model from computeLayout
         * @returns {Array} Array of canvas DOM elements
         */
        function renderPreviewCanvas(pageLayoutModel) {
            const canvases = [];
            
            // Calculate canvas dimensions (A4 landscape at 96 DPI)
            const canvasWidthPx = Math.round(LAYOUT_CONSTANTS.PAGE_WIDTH_MM * 3.7795); // 1122px
            const canvasHeightPx = Math.round(LAYOUT_CONSTANTS.PAGE_HEIGHT_MM * 3.7795); // 794px
            
            pageLayoutModel.forEach((page, pageIdx) => {
                // Create canvas element
                const canvas = document.createElement('canvas');
                canvas.width = canvasWidthPx;
                canvas.height = canvasHeightPx;
                canvas.className = 'previewPage';
                
                const ctx = canvas.getContext('2d');
                
                // Fill page background (white)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvasWidthPx, canvasHeightPx);
                
                // Render each strip
                page.strips.forEach(strip => {
                    renderStripToCanvas(ctx, strip);
                });
                
                // Render page number
                if (page.pageNumberElement) {
                    renderPageNumberToCanvas(ctx, page.pageNumberElement);
                }
                
                canvases.push(canvas);
            });
            
            return canvases;
        }

        /**
         * Render a single strip to canvas
         * 
         * @param {CanvasRenderingContext2D} ctx - Canvas context
         * @param {Object} strip - Strip layout object
         */
        function renderStripToCanvas(ctx, strip) {
            // Convert mm coordinates to pixels
            const xPx = (strip.xMm + LAYOUT_CONSTANTS.MARGIN_LEFT_MM) * 3.7795;
            const yPx = (strip.yMm + LAYOUT_CONSTANTS.MARGIN_TOP_MM) * 3.7795;
            const widthPx = strip.widthMm * 3.7795;
            const heightPx = strip.heightMm * 3.7795;
            
            // Draw background rectangle
            const [r, g, b] = strip.backgroundColorRgb;
            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.fillRect(xPx, yPx, widthPx, heightPx);
            
            // Draw outer border
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2;
            ctx.strokeRect(xPx, yPx, widthPx, heightPx);
            
            // Draw column separator lines (for scene strips only)
            if (strip.stripType === 'scene') {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                
                // Draw vertical lines at each column boundary (but NOT after the last column)
                const columnBoundaries = [
                    COLUMN_X_POSITIONS.INT_EXT_DAYNIGHT,
                    COLUMN_X_POSITIONS.SET_DESCRIPTION,
                    COLUMN_X_POSITIONS.CAST,
                    COLUMN_X_POSITIONS.LOCATION,
                    COLUMN_X_POSITIONS.PAGES,
                    COLUMN_X_POSITIONS.EST_TIME  // Separator before EST_TIME column
                    // No separator after EST_TIME (it's the last column)
                ];
                
                columnBoundaries.forEach(boundaryMm => {
                    const boundaryPx = (boundaryMm + LAYOUT_CONSTANTS.MARGIN_LEFT_MM) * 3.7795;
                    ctx.beginPath();
                    ctx.moveTo(boundaryPx, yPx);
                    ctx.lineTo(boundaryPx, yPx + heightPx);
                    ctx.stroke();
                });
            }
            
            // Set text color
            const [tr, tg, tb] = strip.textColorRgb;
            ctx.fillStyle = `rgb(${tr}, ${tg}, ${tb})`;
            
            // Render each column
            strip.columns.forEach(column => {
                renderColumnToCanvas(ctx, column, strip.yMm, strip.stripType);
            });
        }

        /**
         * Render a column's text to canvas
         * 
         * @param {CanvasRenderingContext2D} ctx - Canvas context
         * @param {Object} column - Column layout object
         * @param {number} stripYMm - Strip Y position in mm
         */
        function renderColumnToCanvas(ctx, column, stripYMm, stripType) {
            const xPx = (column.xMm + LAYOUT_CONSTANTS.MARGIN_LEFT_MM) * 3.7795;
            const yPx = (stripYMm + LAYOUT_CONSTANTS.MARGIN_TOP_MM) * 3.7795;
            const fontSizePx = column.fontSizeMm * 3.7795;
            
            // Handle cast legend with circles
            if (column.useLegendCircles) {
                renderCastLegendWithCircles(ctx, column, stripYMm);
                return;
            }
            
            // Determine text color based on strip type
            // Daybreaks and headers use white text, everything else uses black
            const textColor = (stripType === 'daybreak' || stripType === 'header') ? '#FFFFFF' : '#000000';
            
            // Set font and text color
            ctx.fillStyle = textColor;
            ctx.font = `${column.fontWeight} ${fontSizePx}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
            ctx.textBaseline = 'top';
            
            // Handle multi-line text
            if (column.text.includes('\n')) {
                const lines = column.text.split('\n');
                const lineHeight = fontSizePx * 1.2; // 1.2 line spacing
                
                // Center vertically within strip height
                const totalTextHeight = lines.length * lineHeight;
                const stripHeightPx = LAYOUT_CONSTANTS.STRIP_HEIGHT_MM * 3.7795;
                const verticalOffset = (stripHeightPx - totalTextHeight) / 2;
                
                lines.forEach((line, idx) => {
                    const lineY = yPx + verticalOffset + (idx * lineHeight);
                    
                    // Special handling for set_description column: first line is bold (Set name), second line is italic (Description)
                    if (column.columnName === 'set_description') {
                        if (idx === 0) {
                            // First line: Set name in bold
                            ctx.fillStyle = textColor;
                            ctx.font = `bold ${fontSizePx}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
                            renderTextLine(ctx, line, xPx, lineY, column.widthMm * 3.7795, column.alignment);
                        } else {
                            // Second line: Description in italic
                            const cleanLine = line.replace(/\[ITALIC\]|\[\/ITALIC\]/g, '');
                            ctx.fillStyle = textColor;
                            ctx.font = `italic ${fontSizePx}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
                            renderTextLine(ctx, cleanLine, xPx, lineY, column.widthMm * 3.7795, column.alignment);
                        }
                        // Reset font
                        ctx.fillStyle = textColor;
                        ctx.font = `${column.fontWeight} ${fontSizePx}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
                    } else {
                        ctx.fillStyle = textColor;
                        renderTextLine(ctx, line, xPx, lineY, column.widthMm * 3.7795, column.alignment);
                    }
                });
            } else {
                // Single line - center vertically
                ctx.fillStyle = textColor;
                const stripHeightPx = LAYOUT_CONSTANTS.STRIP_HEIGHT_MM * 3.7795;
                const verticalOffset = (stripHeightPx - fontSizePx) / 2;
                const lineY = yPx + verticalOffset;
                renderTextLine(ctx, column.text, xPx, lineY, column.widthMm * 3.7795, column.alignment);
            }
        }

        /**
         * Render cast numbers with encircled alphanumeric formatting
         */
        function renderCastWithCircles(ctx, column, stripYMm) {
            const xPx = (column.xMm + LAYOUT_CONSTANTS.MARGIN_LEFT_MM) * 3.7795;
            const yPx = (stripYMm + LAYOUT_CONSTANTS.MARGIN_TOP_MM) * 3.7795;
            const fontSizePx = column.fontSizeMm * 3.7795;
            const stripHeightPx = LAYOUT_CONSTANTS.STRIP_HEIGHT_MM * 3.7795;
            
            const circleDiameter = fontSizePx * 1.5; // Circle size relative to font
            const circleRadius = circleDiameter / 2;
            const horizontalSpacing = fontSizePx * 0.3; // Space between circles
            
            // Handle cast legend differently (includes names after numbers)
            if (column.useLegendCircles) {
                renderCastLegendWithCircles(ctx, column, stripYMm);
                return;
            }
            
            // Split by lines (already wrapped by wrapCastNumbers)
            const lines = column.text.split('\n');
            const lineHeight = circleDiameter + 2; // Tight line spacing for circles
            
            // Center vertically
            const totalHeight = lines.length * lineHeight;
            const verticalOffset = (stripHeightPx - totalHeight) / 2;
            
            lines.forEach((line, lineIdx) => {
                const castNumbers = line.trim().split(/\s+/); // Split on whitespace
                let currentX = xPx + circleRadius + 2; // Start position with padding
                const currentY = yPx + verticalOffset + (lineIdx * lineHeight) + circleRadius;
                
                castNumbers.forEach(castNum => {
                    if (!castNum) return; // Skip empty strings
                    
                    // Draw circle
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(currentX, currentY, circleRadius, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    // Draw number in white
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = `bold ${fontSizePx * 0.8}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(castNum, currentX, currentY);
                    
                    // Move to next position
                    currentX += circleDiameter + horizontalSpacing;
                });
            });
            
            // Reset text align
            ctx.textAlign = 'left';
        }

        /**
         * Render cast legend with circles and names
         */
        /**
         * Render cast legend with encircled numbers - supports multi-line layout
         * 
         * @param {CanvasRenderingContext2D} ctx - Canvas context
         * @param {Object} column - Column layout object
         * @param {number} stripYMm - Strip Y position in mm
         */
        function renderCastLegendWithCircles(ctx, column, stripYMm) {
            const xPx = (column.xMm + LAYOUT_CONSTANTS.MARGIN_LEFT_MM) * 3.7795;
            const yPx = (stripYMm + LAYOUT_CONSTANTS.MARGIN_TOP_MM) * 3.7795;
            const fontSizePx = column.fontSizeMm * 3.7795;
            const stripHeightPx = LAYOUT_CONSTANTS.STRIP_HEIGHT_MM * 3.7795;
            
            const circleDiameter = fontSizePx * 1.4;
            const circleRadius = circleDiameter / 2;
            const lineHeight = fontSizePx * 1.2;
            
            // Split into lines
            const lines = column.text.split('\n');
            
            // Calculate vertical offset to center multi-line content
            const totalHeight = lines.length * lineHeight;
            const legendHeightPx = stripHeightPx * lines.length; // Dynamic height
            const verticalOffset = (legendHeightPx - totalHeight) / 2;
            
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';
            
            lines.forEach((line, lineIdx) => {
                const lineY = yPx + verticalOffset + (lineIdx * lineHeight) + (lineHeight / 2);
                let currentX = xPx + 5;
                
                // Check if this line starts with "CAST:"
                const hasCastLabel = line.startsWith('CAST: ');
                
                if (hasCastLabel) {
                    // Render "CAST:" label
                    ctx.fillStyle = '#000000';
                    ctx.font = `bold ${fontSizePx}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
                    ctx.fillText('CAST:', currentX, lineY);
                    
                    const labelWidth = ctx.measureText('CAST:').width;
                    currentX += labelWidth + 15;
                    
                    // Remove "CAST: " from line for processing
                    line = line.substring(6);
                }
                
                // Parse entries in this line (separated by double spaces)
                const entries = line.split('  ').filter(e => e.trim());
                
                // Render each cast entry with circle
                entries.forEach(entry => {
                    const match = entry.match(/^(\d+)\s+(.+)$/);
                    if (!match) return;
                    
                    const castNum = match[1];
                    const castName = match[2];
                    
                    // Draw circle
                    ctx.fillStyle = '#000000';
                    ctx.beginPath();
                    ctx.arc(currentX + circleRadius, lineY, circleRadius, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    // Draw number in white
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = `bold ${fontSizePx * 0.7}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
                    ctx.textAlign = 'center';
                    ctx.fillText(castNum, currentX + circleRadius, lineY);
                    
                    // Draw name
                    currentX += circleDiameter + 4;
                    ctx.fillStyle = '#000000';
                    ctx.font = `normal ${fontSizePx}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
                    ctx.textAlign = 'left';
                    ctx.fillText(castName, currentX, lineY);
                    
                    // Move to next entry
                    const nameWidth = ctx.measureText(castName).width;
                    currentX += nameWidth + 15;
                });
            });
            
            // Reset
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
        }

        /**
         * Render a single line of text with alignment
         * 
         * @param {CanvasRenderingContext2D} ctx - Canvas context
         * @param {string} text - Text to render
         * @param {number} xPx - X position in pixels
         * @param {number} yPx - Y position in pixels
         * @param {number} widthPx - Column width in pixels
         * @param {string} alignment - 'left', 'center', or 'right'
         */
        function renderTextLine(ctx, text, xPx, yPx, widthPx, alignment) {
            let textX = xPx;
            
            if (alignment === 'center') {
                const textWidth = ctx.measureText(text).width;
                textX = xPx + (widthPx - textWidth) / 2;
            } else if (alignment === 'right') {
                const textWidth = ctx.measureText(text).width;
                textX = xPx + widthPx - textWidth;
            } else {
                // Left alignment - add small padding
                textX = xPx + 3;
            }
            
            ctx.fillText(text, textX, yPx);
        }

        /**
         * Render page number to canvas
         * 
         * @param {CanvasRenderingContext2D} ctx - Canvas context
         * @param {Object} pageNumberElement - Page number layout object
         */
        function renderPageNumberToCanvas(ctx, pageNumberElement) {
            const xPx = (pageNumberElement.xMm + LAYOUT_CONSTANTS.MARGIN_LEFT_MM) * 3.7795;
            const yPx = (pageNumberElement.yMm + LAYOUT_CONSTANTS.MARGIN_TOP_MM) * 3.7795;
            const fontSizePx = pageNumberElement.fontSizeMm * 3.7795;
            
            ctx.fillStyle = '#666666';
            ctx.font = `${pageNumberElement.fontWeight} ${fontSizePx}px ${LAYOUT_CONSTANTS.FONT_FAMILY}`;
            ctx.textBaseline = 'top';
            ctx.fillText(pageNumberElement.text, xPx, yPx);
        }

        // Create datalists for autocomplete
        function updateDataLists() {
            // Not needed anymore since we're using dropdowns
        }

        // Trigger re-render when cast/location/set lists change
        let lastCastData = '';
        let lastLocationData = '';
        let lastSetData = '';

        setInterval(() => {
            const currentCastData = getCastList().map(c => `${c.number}:${c.name}`).join('|');
            const currentLocationData = getLocationList().join('|');
            const currentSetData = getSetList().join('|');

            if (currentCastData !== lastCastData || 
                currentLocationData !== lastLocationData || 
                currentSetData !== lastSetData) {
                lastCastData = currentCastData;
                lastLocationData = currentLocationData;
                lastSetData = currentSetData;
                renderStrips();
            }
        }, 500);
        
        // Preview auto-fit on window resize (Frame Chart Generator approach)
        window.addEventListener('resize', () => {
            if (document.getElementById('previewOverlay').classList.contains('active')) {
                setTimeout(fitPreview, 100);
            }
        });
    </script>

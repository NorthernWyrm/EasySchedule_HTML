        /**
         * Strip Sorting System - V3.3
         * Sorts scene strips by Set → Time of Day → INT/EXT
         * Two modes: Global (across entire stripboard) or Within Days (per segment)
         */
        
        /**
         * Compare Set Names
         * Priority: Valid names (A-Z) → "UNNAMED SET" → null/empty
         */
        function compareSetNames(setA, setB) {
            // Normalize null and empty string
            const a = setA || null;
            const b = setB || null;
            
            // Both null → equal (stable sort preserves order)
            if (a === null && b === null) return 0;
            
            // A is null → A comes after B
            if (a === null) return 1;
            
            // B is null → B comes after A
            if (b === null) return -1;
            
            // Both "UNNAMED SET" → equal
            if (a === "UNNAMED SET" && b === "UNNAMED SET") return 0;
            
            // A is "UNNAMED SET" → A comes after B (but before null)
            if (a === "UNNAMED SET") return 1;
            
            // B is "UNNAMED SET" → B comes after A (but before null)
            if (b === "UNNAMED SET") return -1;
            
            // Both are valid set names → alphabetical (case-insensitive, locale-aware)
            return a.localeCompare(b, undefined, { sensitivity: 'base' });
        }
        
        /**
         * Compare Time of Day
         * Order: DAWN → DAY → DUSK → NIGHT
         * Null/undefined defaults to DAY
         */
        function compareTimeOfDay(todA, todB) {
            const order = { 'Dawn': 0, 'Day': 1, 'Dusk': 2, 'Night': 3 };
            
            // Normalize null/undefined to DAY
            const a = todA || 'Day';
            const b = todB || 'Day';
            
            const rankA = order[a] !== undefined ? order[a] : 1; // Default to Day
            const rankB = order[b] !== undefined ? order[b] : 1;
            
            return rankA - rankB;
        }
        
        /**
         * Compare INT/EXT
         * Order: INT → EXT → INT/EXT
         * Null/undefined defaults to INT
         */
        function compareIntExt(intExtA, intExtB) {
            const order = { 'INT': 0, 'EXT': 1, 'INT/EXT': 2 };
            
            // Normalize null/undefined to INT
            const a = intExtA || 'INT';
            const b = intExtB || 'INT';
            
            const rankA = order[a] !== undefined ? order[a] : 0; // Default to INT
            const rankB = order[b] !== undefined ? order[b] : 0;
            
            return rankA - rankB;
        }
        
        /**
         * Stable Sort Comparison Function
         * Priority: 1. Set, 2. Time of Day, 3. INT/EXT
         * Returns: negative (a before b), 0 (equal), positive (b before a)
         */
        function compareStrips(stripA, stripB) {
            // Priority 1: Set
            const setComparison = compareSetNames(stripA.setName, stripB.setName);
            if (setComparison !== 0) return setComparison;
            
            // Priority 2: Time of Day
            const todComparison = compareTimeOfDay(stripA.timeOfDay, stripB.timeOfDay);
            if (todComparison !== 0) return todComparison;
            
            // Priority 3: INT/EXT
            const intExtComparison = compareIntExt(stripA.intExt, stripB.intExt);
            return intExtComparison;
            
            // If all equal, stable sort preserves original order (JS ES2019+)
        }
        
        /**
         * Detect Problematic Strips
         * Returns counts of UNNAMED SET and null/empty set names
         */
        function detectProblematicStrips(sceneStrips) {
            let unnamedSetCount = 0;
            let nullSetCount = 0;
            
            sceneStrips.forEach(strip => {
                if (strip.setName === "UNNAMED SET") {
                    unnamedSetCount++;
                } else if (!strip.setName || strip.setName === "") {
                    nullSetCount++;
                }
            });
            
            return { unnamedSetCount, nullSetCount };
        }
        
        /**
         * Show alert for problematic strips after sort
         */
        function alertProblematicStrips(unnamedSetCount, nullSetCount) {
            if (unnamedSetCount === 0 && nullSetCount === 0) return;
            
            const parts = [];
            
            if (unnamedSetCount > 0) {
                parts.push(`${unnamedSetCount} "UNNAMED SET" strip${unnamedSetCount > 1 ? 's' : ''}`);
            }
            
            if (nullSetCount > 0) {
                parts.push(`${nullSetCount} strip${nullSetCount > 1 ? 's' : ''} with no set name`);
            }
            
            const message = `${parts.join(' and ')} ${parts.length > 1 ? 'have' : 'has'} been moved to the bottom.\n\nPlease review and assign proper set names.`;
            
            alert(message);
        }

        /**

        function initiateSortStrips() {

            if (stripOrderLocked) {

                        sortStripsGlobally();
                    }
                } catch (error) {

                    alert('Sort failed: ' + error.message);

        }

            const message = `Sort ${sceneCount} scene strip${sceneCount !== 1 ? 's' : ''} ${mode}?\n\n` +

        /**
         * Global Sort
         * Movie Magic behavior: Banners to top, remove daybreaks, sort all scenes
         */
        function sortStripsGlobally() {
            // Step 1: Extract banners (preserve order)
            const banners = strips.filter(s => s.type === 'banner');
            
            // Step 2: Extract scene strips
            const scenes = strips.filter(s => s.type === 'scene');
            
            // Step 3: Sort scenes using stable sort
            const sortedScenes = [...scenes].sort(compareStrips);
            
            // Step 4: Detect problematic strips
            const { unnamedSetCount, nullSetCount } = detectProblematicStrips(sortedScenes);
            
            // Step 5: Remove all daybreaks and rebuild strips array
            strips = [...banners, ...sortedScenes];
            
            // Step 6: Append final daybreak at end
            const finalDaybreak = {
                id: Date.now(),
                type: 'daybreak',
                callTime: '06:00',
                active: true
            };
            strips.push(finalDaybreak);
            
            // Step 7: Post-sort actions
            recalcSchedule();
            clearAllFilters();
            renderStrips();
            scrollToTop();
            
            // Step 8: Alert if problematic strips detected
            alertProblematicStrips(unnamedSetCount, nullSetCount);
        }
        
        /**
         * Within Days Sort
         * Sorts scenes independently within each day segment (between daybreaks)
         * Banners move to top of their respective segments
         * Daybreaks remain in place
         */
        function sortStripsWithinDays() {
            // Step 1: Find all daybreak indices
            const daybreakIndices = [];
            strips.forEach((strip, index) => {
                if (strip.type === 'daybreak') {
                    daybreakIndices.push(index);
                }
            });
            
            // Edge case: No daybreaks (shouldn't happen, but handle gracefully)
            if (daybreakIndices.length === 0) {
                // Fall back to global sort
                sortStripsGlobally();
                return;
            }
            
            // Step 2: Define segments
            const segments = [];
            for (let i = 0; i < daybreakIndices.length; i++) {
                const segmentStart = i === 0 ? 0 : daybreakIndices[i - 1] + 1;
                const segmentEnd = daybreakIndices[i]; // Exclusive (daybreak not included)
                
                // Always add segment, even if empty (preserves daybreak structure)
                segments.push({ start: segmentStart, end: segmentEnd });
            }
            
            // Step 3: Sort each segment independently
            let totalUnnamedSet = 0;
            let totalNull = 0;
            
            const newStrips = [];
            
            segments.forEach(segment => {
                // Extract strips in this segment
                const segmentStrips = strips.slice(segment.start, segment.end);
                
                // If segment is empty, just add the daybreak and continue
                if (segmentStrips.length === 0) {
                    newStrips.push(strips[segment.end]); // Add daybreak
                    return;
                }
                
                // Separate banners and scenes
                const banners = segmentStrips.filter(s => s.type === 'banner');
                const scenes = segmentStrips.filter(s => s.type === 'scene');
                
                // Sort scenes
                const sortedScenes = [...scenes].sort(compareStrips);
                
                // Detect problematic strips in this segment
                const { unnamedSetCount, nullSetCount } = detectProblematicStrips(sortedScenes);
                totalUnnamedSet += unnamedSetCount;
                totalNull += nullSetCount;
                
                // Rebuild segment: banners first, then sorted scenes
                newStrips.push(...banners, ...sortedScenes);
                
                // Add the daybreak that ends this segment
                newStrips.push(strips[segment.end]);
            });
            
            // Step 4: Replace strips array
            strips = newStrips;
            
            // Step 5: Post-sort actions
            recalcSchedule();
            clearAllFilters();
            renderStrips();
            scrollToTop();
            
            // Step 6: Alert if problematic strips detected
            alertProblematicStrips(totalUnnamedSet, totalNull);
        }

        function loadFromCSV() {
            // Confirm before destructive action
            if (!confirm('This will replace your current stripboard. Continue?')) {
                return;
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const csvText = event.target.result;
                        
                        // Parse metadata and strip data
                        const lines = csvText.split('\n');
                        const metadataLines = [];
                        let stripDataStart = 0;
                        
                        // Extract metadata (comment lines starting with #)
                        for (let i = 0; i < lines.length; i++) {
                            if (lines[i].startsWith('#')) {
                                metadataLines.push(lines[i]);
                                stripDataStart = i + 1;
                            } else {
                                break;
                            }
                        }
                        
                        // Parse metadata
                        console.log('Metadata lines:', metadataLines);
                        metadataLines.forEach(line => {
                            // Remove leading # and parse as CSV (respecting quotes)
                            const csvLine = line.substring(1).trim();
                            
                            // Find first comma that's not inside quotes
                            let inQuotes = false;
                            let commaIndex = -1;
                            
                            for (let i = 0; i < csvLine.length; i++) {
                                if (csvLine[i] === '"') {
                                    inQuotes = !inQuotes;
                                } else if (csvLine[i] === ',' && !inQuotes) {
                                    commaIndex = i;
                                    break;
                                }
                            }
                            
                            if (commaIndex === -1) {
                                // No comma found (shouldn't happen)
                                return;
                            }
                            
                            const key = csvLine.substring(0, commaIndex).trim();
                            let value = csvLine.substring(commaIndex + 1).trim();
                            
                            // Remove surrounding quotes if present
                            if (value.startsWith('"') && value.endsWith('"')) {
                                value = value.substring(1, value.length - 1);
                                // Unescape double quotes
                                value = value.replace(/""/g, '"');
                            }
                            
                            console.log('Parsing metadata - Key:', key, 'Value:', value.substring(0, 100));
                            
                            if (key === 'Project Name') document.getElementById('projectName').value = value;
                            if (key === 'Project Date') document.getElementById('projectDate').value = value;
                            // V2.7.1: dayNumber and totalDays inputs removed in V2.6, skip these fields
                            // if (key === 'Day') { ... }
                            // if (key === 'Days') { ... }
                            if (key === 'Call Time') {
                                const startTimeInput = document.getElementById('startTime');
                                if (startTimeInput) startTimeInput.value = value;
                            }
                            
                            // Rebuild Cast Assignment list

                                };
                                
                                if (originalIndex !== undefined) {

                                strips.push(strip);

                        });
                        
                        // Validate and auto-populate orphaned locations and sets
                        validateAndPopulateAssignments();
                        
                        // Recalculate schedule metrics (dayMetrics) after loading
                        recalcSchedule();

                    } catch (error) {

        /**
         * FDX PARSER - Complete Implementation
         * Handles multiple FDX format variations with robust error handling

        /**
         * Import FDX File
         * Entry point for FDX import workflow
         */
        function importFDX() {
            // Confirmation if stripboard has existing data
            if (strips.length > 0) {
                if (!confirm('This will replace your current stripboard. Continue?')) {
                    return;
                }
            }
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.fdx,.fdxt,.xml';
            
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                try {
                    const content = await file.text();
                    const importedStrips = parseFDX(content);
                    
                    if (importedStrips.length === 0) {
                        alert('No scenes found in FDX file.');
                        return;
                    }
                    
                    // Replace strips
                    strips = importedStrips;
                    
                    // Clear assignment lists for fresh FDX import
                    document.getElementById('castList').innerHTML = '';
                    document.getElementById('setList').innerHTML = '';
                    document.getElementById('locationList').innerHTML = '';
                    
                    // Convert cast names to numbers and populate cast list
                    processFDXCast();
                    
                    // Populate set/location lists and validate assignments
                    validateAndPopulateAssignments();
                    
                    // Post-import actions
                    recalcSchedule();
                    renderStrips();
                    populateFilterUI();
                    
                    // Clear filters
                    activeFilters.days = [];
                    activeFilters.sets = [];
                    activeFilters.locations = [];
                    
                    // Scroll to top
                    document.querySelector('.work-area').scrollTo(0, 0);
                    
                    alert(`Successfully imported ${importedStrips.length} scenes from FDX.`);
                    
                } catch (error) {
                    console.error('FDX Import Error:', error);
                    alert(`FDX Import Failed:\n${error.message}\n\nPlease check that the file is a valid Final Draft document.`);
                }
            };
            
            input.click();
        }
        
        /**
         * Parse FDX Content
         * Main parser entry point - validates XML and routes to appropriate parser
         */
        function parseFDX(xmlContent) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlContent, "text/xml");
            
            // Check for parse errors
            const parseError = xmlDoc.querySelector('parsererror');
            if (parseError) {
                throw new Error('Invalid XML format');
            }
            
            // Validate FDX structure
            const finalDraft = xmlDoc.querySelector('FinalDraft');
            if (!finalDraft) {
                throw new Error('Not a valid FDX file: Missing FinalDraft root element');
            }
            
            const content = xmlDoc.querySelector('Content');
            if (!content) {
                throw new Error('Not a valid FDX file: Missing Content element');
            }
            
            // Get all scene heading paragraphs
            const sceneHeadings = Array.from(xmlDoc.querySelectorAll('Paragraph[Type="Scene Heading"]'));
            
            if (sceneHeadings.length === 0) {
                throw new Error('No scenes found in FDX file');
            }
            
            // Parse scenes
            return parseScenes(xmlDoc, sceneHeadings);
        }
        
        /**
         * Parse Scenes from FDX
         * Iterates through scene headings and extracts strips with cast
         */
        function parseScenes(xmlDoc, sceneHeadings) {
            const strips = [];
            const allParagraphs = Array.from(xmlDoc.querySelectorAll('Content > Paragraph'));
            
            sceneHeadings.forEach((sceneHeading, index) => {
                try {
                    // Extract full text from heading
                    const headingText = extractFullText(sceneHeading);
                    
                    // Skip OMITTED scenes
                    if (headingText.trim().toUpperCase() === 'OMITTED') {
                        return;
                    }
                    
                    // Get SceneProperties (child of scene heading paragraph)
                    const sceneProps = sceneHeading.querySelector('SceneProperties');
                    
                    // Extract scene number
                    const sceneNumber = extractSceneNumber(sceneHeading, headingText, index);
                    
                    // Parse scene heading
                    const { intExt, setName, timeOfDay } = parseSceneHeading(headingText);
                    
                    // Extract page length
                    const lengthStr = sceneProps ? sceneProps.getAttribute('Length') || '' : '';
                    const { whole, fraction } = parseFDXLength(lengthStr);
                    
                    // Extract cast (from both CharacterArcBeats and Character paragraphs)
                    const cast = extractCastForScene(sceneHeading, sceneProps, allParagraphs, index, sceneHeadings);
                    
                    // Create strip
                    const strip = {
                        id: Date.now() + index,
                        type: 'scene',
                        sceneNumber: sceneNumber,
                        intExt: intExt,
                        setName: setName,
                        location: '', // Not parsed per requirements
                        description: '', // Not parsed per requirements
                        cast: cast,
                        timeOfDay: timeOfDay,
                        sceneLengthWhole: whole,
                        sceneLengthFraction: fraction,
                        estTime: calculateEstTime(whole, fraction),
                        active: true,
                        uiMinimized: true
                    };
                    
                    strips.push(strip);
                    
                } catch (error) {
                    console.warn(`Failed to parse scene ${index + 1}:`, error);
                    // Continue parsing other scenes
                }
            });
            
            return strips;
        }
        
        /**
         * Extract Full Text from Paragraph
         * Handles multiple Text nodes with different formatting
         */
        function extractFullText(paragraphElement) {
            const textNodes = paragraphElement.querySelectorAll('Text');
            
            if (textNodes.length === 0) {
                return '';
            }
            
            // Concatenate all Text nodes (spaces already in content)
            const fullText = Array.from(textNodes)
                .map(node => node.textContent)
                .join('');
            
            return fullText.trim();
        }
        
        /**
         * Extract Scene Number
         * Priority: Number attribute > Parse from text > Auto-number
         */
        function extractSceneNumber(sceneHeading, headingText, fallbackIndex) {
            // Priority 1: Number attribute
            const numberAttr = sceneHeading.getAttribute('Number');
            if (numberAttr) {
                return numberAttr; // "1", "5A", "42B"
            }
            
            // Priority 2: Parse from text content
            // Match patterns: "1. ", "5A. ", "42B. "
            const match = headingText.match(/^(\d+[A-Z]?)\.\s/);
            if (match) {
                return match[1];
            }
            
            // Priority 3: Auto-number sequentially
            return (fallbackIndex + 1).toString();
        }
        
        /**
         * Parse Scene Heading
         * Extracts INT/EXT, Set Name, and Time of Day from heading text
         * Strategy: Find FIRST valid ToD match, use everything before it as Set
         */
        function parseSceneHeading(headingText) {
            // Remove scene number prefix if present
            // Patterns: "1. ", "5A. ", "42B. ", "1.- ", "30.- "
            let cleanText = headingText.replace(/^\d+[A-Z]?\.-?\s*/, '');
            
            // Extract INT/EXT (supports INT, EXT, INT/EXT, I/E, INT./EXT.)
            const intExtMatch = cleanText.match(/^(INT\.?\s*\/?\s*EXT\.?|I\.?\s*\/?\s*E\.?|INT\.?|EXT\.?|EST\.?)/i);
            const intExt = intExtMatch ? normalizeIntExt(intExtMatch[1]) : 'INT';
            
            // Remove INT/EXT prefix
            cleanText = cleanText.replace(/^(INT\.?\s*\/?\s*EXT\.?|I\.?\s*\/?\s*E\.?|INT\.?|EXT\.?|EST\.?)\s*/i, '').trim();
            
            // Strategy: Split by common separators (dash, period) and test each segment
            // Use FIRST match to a valid ToD
            let timeOfDay = 'Day'; // Default
            let setName = cleanText;
            let bestToDMatch = null;
            
            // Split by dashes OR periods (but keep track of position)
            const segments = [];
            const separatorPattern = /[-–—.]+/g;
            let lastIndex = 0;
            let match;
            
            while ((match = separatorPattern.exec(cleanText)) !== null) {
                const segment = cleanText.substring(lastIndex, match.index).trim();
                if (segment) {
                    segments.push({
                        text: segment,
                        startPos: lastIndex,
                        endPos: match.index
                    });
                }
                lastIndex = match.index + match[0].length;
            }
            
            // Add final segment
            const finalSegment = cleanText.substring(lastIndex).trim();
            if (finalSegment) {
                segments.push({
                    text: finalSegment,
                    startPos: lastIndex,
                    endPos: cleanText.length
                });
            }
            
            // Test each segment against ToD normalizer
            for (let i = 0; i < segments.length; i++) {
                const segment = segments[i];
                const normalized = normalizeTimeOfDay(segment.text);
                
                // If normalization changed the value, it's a valid ToD
                if (normalized !== 'Day' || segment.text.toUpperCase().trim() === 'DAY' || segment.text.toUpperCase().trim() === 'DIA' || segment.text.toUpperCase().trim() === 'DÍA') {
                    // Found valid ToD - use this one
                    timeOfDay = normalized;
                    setName = cleanText.substring(0, segment.startPos).trim();
                    break; // Use FIRST valid ToD
                }
            }
            
            // Clean set name - remove trailing separators
            setName = setName.replace(/[-–—.]+$/, '').trim();
            setName = setName || 'UNNAMED SET';
            
            return { intExt, setName, timeOfDay };
        }
        
        /**
         * Normalize INT/EXT variations
         */
        function normalizeIntExt(rawIntExt) {
            const upper = rawIntExt.toUpperCase().replace(/[\s.]/g, ''); // Remove spaces and periods
            
            if (upper.includes('/')) {
                return 'INT/EXT';
            } else if (upper.startsWith('E')) {
                return 'EXT';
            } else {
                return 'INT';
            }
        }
        
        /**
         * Normalize Time of Day
         * Uses canonical mapping table (English + Spanish)
         */
        function normalizeTimeOfDay(rawToD) {
            const upper = rawToD.toUpperCase().trim();
            
            // Canonical mapping (from uploaded table)
            const canonicalMap = {
                // DAY variations
                'DAY': 'Day', 'DAYTIME': 'Day', 'MIDDAY': 'Day', 'NOON': 'Day',
                'AFTERNOON': 'Day', 'MORNING': 'Day', 'LATE MORNING': 'Day',
                'EARLY AFTERNOON': 'Day', 'DAYLIGHT': 'Day', 'BROAD DAYLIGHT': 'Day',
                'DIA': 'Day', 'DÍA': 'Day', 'DE DIA': 'Day', 'DE DÍA': 'Day',
                'MEDIODIA': 'Day', 'MEDIODÍA': 'Day', 'MAÑANA': 'Day',
                'TARDE': 'Day', 'LUZ DEL DIA': 'Day', 'LUZ DEL DÍA': 'Day',
                'CONTINUOUS': 'Day', 'MOMENTS LATER': 'Day', 'LATER': 'Day',
                'CONTINUO': 'Day', 'CONTINUA': 'Day', 'CONTINUACIÓN': 'Day',
                
                // DAWN variations
                'DAWN': 'Dawn', 'DAYBREAK': 'Dawn', 'SUNRISE': 'Dawn',
                'FIRST LIGHT': 'Dawn', 'EARLY MORNING': 'Dawn',
                'AMANECER': 'Dawn', 'ALBA': 'Dawn', 'SALIDA DEL SOL': 'Dawn',
                
                // DUSK variations
                'DUSK': 'Dusk', 'SUNSET': 'Dusk', 'TWILIGHT': 'Dusk',
                'EVENING': 'Dusk', 'MAGIC HOUR': 'Dusk', 'GOLDEN HOUR': 'Dusk',
                'ATARDECER': 'Dusk', 'OCASO': 'Dusk', 'CREPUSCULO': 'Dusk',
                'CREPÚSCULO': 'Dusk', 'ANOCHECER': 'Dusk',
                
                // NIGHT variations
                'NIGHT': 'Night', 'MIDNIGHT': 'Night', 'LATE NIGHT': 'Night',
                'NOCHE': 'Night', 'MEDIA NOCHE': 'Night', 'MADRUGADA': 'Night'
            };
            
            return canonicalMap[upper] || 'Day';
        }
        
        /**
         * Parse FDX Length String
         */
        function parseFDXLength(lengthStr) {
            if (!lengthStr) {
                return { whole: 0, fraction: '1' }; // Default: A 1/8
            }
            
            // Match: "6/8" or "2 3/8"
            const match = lengthStr.match(/^(\d+)?\s*(\d+)\/8$/);
            
            if (match) {
                const whole = match[1] ? parseInt(match[1]) : 0;
                const fraction = match[2] || '0';
                return { whole, fraction };
            }
            
            // Try whole number: "1" → "1 0/8"
            const wholeMatch = lengthStr.match(/^(\d+)$/);
            if (wholeMatch) {
                return { whole: parseInt(wholeMatch[1]), fraction: '0' };
            }
            
            // Fallback
            return { whole: 0, fraction: '1' };
        }
        
        /**
         * Process FDX Cast
         * Converts character names to cast numbers and populates cast list
         */
        function processFDXCast() {
            const castListContainer = document.getElementById('castList');
            const uniqueCharacters = new Set();
            
            // Collect all unique character names from all strips
            strips.forEach(strip => {
                if (strip.cast && Array.isArray(strip.cast)) {
                    strip.cast.forEach(charName => {
                        if (typeof charName === 'string') {
                            uniqueCharacters.add(charName);
                        }
                    });
                }
            });
            
            // Build character name to number mapping
            const charNameToNumber = {};
            let nextCastNumber = 1; // Start from 1 since we cleared the list
            
            uniqueCharacters.forEach(charName => {
                // Add to cast list UI
                const item = document.createElement('div');
                item.className = 'assignment-item';
                item.innerHTML = `
                    <input type="text" placeholder="#" value="${nextCastNumber}" style="width: 40px;">
                    <input type="text" placeholder="Character Name" value="${charName}">
                `;
                castListContainer.appendChild(item);
                
                // Map name to number
                charNameToNumber[charName] = nextCastNumber.toString();
                nextCastNumber++;
            });
            
            // Convert all character names in strips to numbers
            strips.forEach(strip => {
                if (strip.cast && Array.isArray(strip.cast)) {
                    strip.cast = strip.cast.map(charName => {
                        if (typeof charName === 'string') {
                            return charNameToNumber[charName] || charName;
                        }
                        return charName; // Already a number
                    });
                }
            });
        }
        
        /**
         * Calculate Estimated Time from Page Length
         * FDX import: Default to 15 minutes (user can adjust manually)
         */
        function calculateEstTime(whole, fraction) {
            // FDX doesn't provide estimated time
            // Default to 15 minutes per scene
            return 15;
        }
        
        /**
         * Extract Cast for Scene
         * Combines CharacterArcBeats and Character paragraphs
         */
        function extractCastForScene(sceneHeading, sceneProps, allParagraphs, sceneIndex, allSceneHeadings) {
            const cast = [];
            const castList = getCastList(); // Get current cast list
            
            // 1. PRIMARY: Collect characters from dialogue (Paragraph Type="Character")
            const sceneHeadingIdx = allParagraphs.indexOf(sceneHeading);
            const nextSceneIdx = sceneIndex + 1 < allSceneHeadings.length 
                ? allParagraphs.indexOf(allSceneHeadings[sceneIndex + 1])
                : allParagraphs.length;
            
            // Get paragraphs between this scene and next scene
            for (let i = sceneHeadingIdx + 1; i < nextSceneIdx; i++) {
                const para = allParagraphs[i];
                if (para.getAttribute('Type') === 'Character') {
                    const charName = extractFullText(para).trim();
                    if (charName && !cast.includes(charName)) {
                        cast.push(charName);
                    }
                }
            }
            
            // 2. SECONDARY: Add non-speaking characters from CharacterArcBeats
            if (sceneProps) {
                const arcBeats = sceneProps.querySelectorAll('CharacterArcBeat');
                arcBeats.forEach(beat => {
                    const charName = beat.getAttribute('Name');
                    if (charName && !cast.includes(charName)) {
                        cast.push(charName); // Non-speaking role
                    }
                });
            }
            
            // Convert character names to cast numbers
            return cast.map(name => {
                const idx = castList.findIndex(c => c.name === name);
                if (idx === -1) {
                    // Character not in cast list - will be auto-populated later
                    // Return temporary identifier
                    return name; // Will be converted after import
                } else {
                    return castList[idx].number;
                }
            });
        }

            if (strip.type === 'banner') return `banner-${strip.bannerColor || 'beige'}`;
            if (strip.type === 'daybreak') return 'daybreak';
            
            const intExt = strip.intExt.toLowerCase();

            // Industry standard color mapping
            const colorMap = {
                'int-dawn': 'dawn-int',
                'ext-dawn': 'dawn-ext',
                'int/ext-dawn': 'dawn-int', // INT/EXT uses INT color
                'int-day': 'day-int',
                'ext-day': 'day-ext',
                'int/ext-day': 'day-int', // INT/EXT uses INT color
                'ext-dusk': 'dusk-ext',

                'int-night': 'night-int',
                'ext-night': 'night-ext',

            return colorMap[`${intExt}-${timeOfDay}`] || 'day-int';

        function createDayHeader(dayIndex, callTime, daybreakId) {

        function updateDaybreakCallTime(daybreakId, newCallTime) {

            filteredStrips.forEach((strip, index) => {

                const stripEl = createStripElement(strip, index);
                container.appendChild(stripEl);
            });

            updateBoneyardCount();
            // calculateDayBreak is now handled by recalcSchedule() in the mutation pipeline
            
            // PHASE 3: Populate filter UI with current options
            populateFilterUI();
            
            // Add container-level drag handlers to prevent negation
            // (container already declared above)
            
            // Remove old listeners if they exist
            container.removeEventListener('dragover', handleContainerDragOver);
            container.removeEventListener('drop', handleContainerDrop);
            container.removeEventListener('dragleave', handleContainerDragLeave);
            
            // Add new listeners
            container.addEventListener('dragover', handleContainerDragOver);
            container.addEventListener('drop', handleContainerDrop);
            container.addEventListener('dragleave', handleContainerDragLeave);

                const isLastDaybreak = strips.filter(s => s.type === 'daybreak').length === 1 ||

            } else {

                          onclick="selectLocation(${strip.id}, '${l.replace(/'/g, "\\'")}')">

                stripEl.innerHTML = `

                        <button class="btn-delete" onclick="deleteStrip(${strip.id})" ${stripOrderLocked ? 'disabled' : ''}>Delete</button>
                    </div>

            // ═══════════════════════════════════════════════════════════
            // DRAG-AND-DROP WITH TIMED HOLD + DOUBLE-CLICK EXPAND/COLLAPSE
            // ═══════════════════════════════════════════════════════════
            
            // Double-click expand/collapse behavior
            stripEl.addEventListener('dblclick', (e) => {
                if (strip.type === 'daybreak') return; // Daybreaks don't minimize
                
                if (strip.uiMinimized) {
                    // Minimized: double-click anywhere → expand
                    toggleMinimize(strip.id);
                    return;
                }
                
                // Expanded: check if click is on a field
                const clickedField = e.target.closest('input, select, textarea, button');
                
                if (clickedField) {
                    // Clicked inside a field → ignore double-click
                    return;
                }
                
                // Clicked on border/handle → collapse
                toggleMinimize(strip.id);
            });
            
            // Timed hold drag setup
            let dragHoldTimer = null;
            let dragReady = false;
            
            // Determine drag zone based on minimized state
            const dragZone = strip.uiMinimized ? stripEl : stripEl.querySelector('.drag-handle');
            
            // Set delay based on state:
            // - Minimized (drag anywhere): 50ms to prevent accidental drags
            // - Expanded (drag handle only): 0ms since handle is intentional
            const dragDelay = strip.uiMinimized ? 50 : 0;
            
            if (dragZone && !stripOrderLocked) {
                // Make drag zone draggable
                dragZone.draggable = true;
                dragZone.style.cursor = 'grab';
                
                // Timed hold before drag activates
                dragZone.addEventListener('pointerdown', (e) => {
                    if (dragDelay === 0) {
                        // No delay - activate immediately
                        dragReady = true;
                        dragZone.style.cursor = 'grabbing';
                    } else {
                        // Start hold timer
                        dragHoldTimer = setTimeout(() => {
                            dragReady = true;
                            dragZone.style.cursor = 'grabbing';
                        }, dragDelay);
                    }
                });
                
                dragZone.addEventListener('pointerup', () => {
                    clearTimeout(dragHoldTimer);
                    dragReady = false;
                    dragZone.style.cursor = 'grab';
                });
                
                dragZone.addEventListener('pointercancel', () => {
                    clearTimeout(dragHoldTimer);
                    dragReady = false;
                    dragZone.style.cursor = 'grab';
                });
                
                // Drag start - only if hold completed
                dragZone.addEventListener('dragstart', (e) => {
                    if (!dragReady) {
                        e.preventDefault(); // Block drag if hold didn't complete
                        return;
                    }
                    
                    e.stopPropagation();
                    stripEl.classList.add('dragging');
                    draggedStripId = parseInt(stripEl.dataset.stripId);
                    e.dataTransfer.effectAllowed = 'move';
                });
                
                dragZone.addEventListener('dragend', (e) => {
                    stripEl.classList.remove('dragging');
                    draggedStripId = null;
                    dragReady = false;
                    dragZone.style.cursor = 'grab';
                    
                    // Remove insertion line
                    const line = document.querySelector('.drag-insertion-line');
                    if (line) line.remove();
                });
            }

            return stripEl;
        }

        function updateStrip(id, field, value) {
            updateScheduleState((strips) => {
                const strip = strips.find(s => s.id === id);
                if (strip) {
                    // Sanitize text fields based on field type
                    let sanitizedValue = value;
                    
                    if (field === 'sceneNumber') {
                        sanitizedValue = sanitizeText(value, INPUT_LIMITS.sceneNumber);
                    } else if (field === 'description') {
                        sanitizedValue = sanitizeText(value, INPUT_LIMITS.sceneDescription);
                    } else if (field === 'setName') {
                        sanitizedValue = sanitizeText(value, INPUT_LIMITS.setName);
                    } else if (field === 'location') {
                        sanitizedValue = sanitizeText(value, INPUT_LIMITS.location);
                    }
                    // intExt, timeOfDay are dropdowns - no sanitization needed
                    
                    strip[field] = sanitizedValue;
                }
            });
        }

        function updateSceneLengthWhole(id, value) {
            updateScheduleState((strips) => {
                const strip = strips.find(s => s.id === id);
                if (strip) {
                    strip.sceneLengthWhole = parseInt(value) || 0;
                }
            });
        }

        function updateSceneLengthFraction(id, value) {
            updateScheduleState((strips) => {
                const strip = strips.find(s => s.id === id);
                if (strip) {
                    let fraction = parseInt(value) || 0;
                    
                    // Handle fraction overflow: move full pages to whole
                    if (fraction >= 8) {
                        const additionalWhole = Math.floor(fraction / 8);
                        strip.sceneLengthWhole = (strip.sceneLengthWhole || 0) + additionalWhole;
                        strip.sceneLengthFraction = fraction % 8;
                    } else {
                        strip.sceneLengthFraction = fraction;
                    }
                }
            });
        }

        // Drag and Drop
        let draggedStripId = null;
        let lastValidInsertPosition = null; // Track last valid drop position

        function handleDragStart(e) {
            draggedStripId = parseInt(e.currentTarget.dataset.stripId);
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            
            const targetStrip = e.currentTarget;
            const rect = targetStrip.getBoundingClientRect();
            const midpoint = rect.top + (rect.height / 2);
            const insertAbove = e.clientY < midpoint;
            
            // Highlight target strip (ghost effect)
            targetStrip.classList.add('drag-over');
            
            // Show insertion line
            let line = document.querySelector('.drag-insertion-line');
            if (!line) {
                line = document.createElement('div');
                line.className = 'drag-insertion-line';
                line.style.cssText = `
                    position: absolute;
                    left: 0;
                    right: 0;
                    height: 4px;
                    background: #FFD700;
                    pointer-events: none;
                    z-index: 9999;
                    box-shadow: 0 0 8px rgba(255, 215, 0, 0.9);
                `;
                const container = document.getElementById('stripsContainer');
                container.style.position = 'relative';
                container.appendChild(line);
            }
            
            // Use offsetTop for accurate positioning within container
            const lineY = insertAbove ? 
                targetStrip.offsetTop - 2 : 
                targetStrip.offsetTop + targetStrip.offsetHeight - 2;
            
            line.style.top = `${lineY}px`;
            
            // Store last valid position
            const targetStripId = parseInt(targetStrip.dataset.stripId);
            lastValidInsertPosition = {
                targetStripId: targetStripId,
                insertAbove: insertAbove
            };
            
            // Store on element for backwards compatibility
            targetStrip.dataset.insertAbove = insertAbove;
        }
        
        function handleContainerDragOver(e) {
            // Prevent default to allow drop anywhere in container
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            
            // If cursor is not over a strip, we're in a gap
            // Don't update insertion line, keep it at last valid position
            // This prevents the 🚫 cursor
        }
        
        function handleContainerDragLeave(e) {
            // Only cancel if actually leaving the container (not just child elements)
            if (e.target.id === 'stripsContainer' && !e.relatedTarget?.closest('#stripsContainer')) {
                // User dragged outside container - show cancel cursor
                const line = document.querySelector('.drag-insertion-line');
                if (line) line.remove();
                
                document.querySelectorAll('.drag-over').forEach(el => {
                    el.classList.remove('drag-over');
                });
                
                lastValidInsertPosition = null;
            }
        }
        
        function handleContainerDrop(e) {
            e.preventDefault();
            
            // If we have a last valid position, use it
            if (lastValidInsertPosition && draggedStripId !== null) {
                const { targetStripId, insertAbove } = lastValidInsertPosition;
                
                // Remove insertion line
                const line = document.querySelector('.drag-insertion-line');
                if (line) line.remove();
                
                // Remove ghost highlighting
                document.querySelectorAll('.drag-over').forEach(el => {
                    el.classList.remove('drag-over');
                });
                
                if (draggedStripId !== targetStripId) {
                    updateScheduleState((strips) => {
                        // Find actual positions in global strips array by ID
                        const draggedIndex = strips.findIndex(s => s.id === draggedStripId);
                        const targetIndex = strips.findIndex(s => s.id === targetStripId);
                        
                        if (draggedIndex === -1 || targetIndex === -1) return;
                        
                        // Remove dragged strip
                        const [removed] = strips.splice(draggedIndex, 1);
                        
                        // Calculate insertion position
                        let insertIndex;
                        if (insertAbove) {
                            insertIndex = targetIndex > draggedIndex ? targetIndex - 1 : targetIndex;
                        } else {
                            insertIndex = targetIndex >= draggedIndex ? targetIndex : targetIndex + 1;
                        }
                        
                        // Insert at new position
                        strips.splice(insertIndex, 0, removed);
                    });
                }
                
                lastValidInsertPosition = null;
            } else {
                // No valid position - cancel drag
                const line = document.querySelector('.drag-insertion-line');
                if (line) line.remove();
                
                document.querySelectorAll('.drag-over').forEach(el => {
                    el.classList.remove('drag-over');
                });
            }
        }
        
        function handleDragLeave(e) {
            // Remove ghost highlighting when leaving a strip
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e) {
            // Strip-level drop - just pass through to container handler
            // The container handler has the last valid position
            e.stopPropagation(); // Prevent duplicate handling
            handleContainerDrop(e);
        }

        function handleDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            draggedStripId = null;
        }

        // Day Break Calculations
        function calculateDayBreak() {
            let totalPages = 0;
            let totalMinutes = 0;

            // Only include active strips in calculations
            strips.filter(s => s.active).forEach(strip => {
                if (strip.type === 'scene') {
                    totalPages += parseSceneLength(strip);
                }
                totalMinutes += strip.estTime || 0;
            });

            document.getElementById('totalPages').textContent = formatPages(totalPages);
            document.getElementById('totalTime').textContent = formatMinutesToTime(totalMinutes);

            // Update Day/Days in day break - render blank if null or 0
            document.getElementById('dayBreakDay').textContent = (projectDayNumber && projectDayNumber !== 0) ? projectDayNumber : '';
            document.getElementById('dayBreakDays').textContent = (projectTotalDays && projectTotalDays !== 0) ? projectTotalDays : '';

            // Calculate end time
            const startTime = document.getElementById('startTime').value;
            if (startTime) {
                const [hours, minutes] = startTime.split(':').map(Number);
                const startDate = new Date();
                startDate.setHours(hours, minutes, 0);
                startDate.setMinutes(startDate.getMinutes() + totalMinutes);
                
                const endHours = String(startDate.getHours()).padStart(2, '0');
                const endMinutes = String(startDate.getMinutes()).padStart(2, '0');
                document.getElementById('endTime').textContent = `${endHours}:${endMinutes}`;
            }
        }

        function formatMinutesToTime(minutes) {
            if (!minutes || minutes === 0) return '0:00';
            const hours = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hours}:${String(mins).padStart(2, '0')}`;
        }

        // V2.6: Format time string to 12-hour format with AM/PM
        function formatTime12Hour(time24) {
            if (!time24 || time24 === '--:--') return '--:-- --';
            
            const [hours, minutes] = time24.split(':').map(Number);
            if (isNaN(hours) || isNaN(minutes)) return '--:-- --';
            
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            return `${String(displayHours).padStart(2, '0')}:${String(minutes).padStart(2, '0')} ${ampm}`;
        }

        // V2.6: Calculate day-of-week and date for a given day index
        function calculateDayDate(dayIndex) {
            const projectDate = document.getElementById('projectDate').value;
            if (!projectDate) return '--';
            
            const baseDate = new Date(projectDate + 'T00:00:00');
            // Day 1 = project date, Day 2 = project date + 1, etc.
            baseDate.setDate(baseDate.getDate() + (dayIndex - 1));
            
            const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayOfWeek = daysOfWeek[baseDate.getDay()];
            
            const day = String(baseDate.getDate()).padStart(2, '0');
            const month = String(baseDate.getMonth() + 1).padStart(2, '0');
            const year = baseDate.getFullYear();
            
            return `${dayOfWeek}, ${month}/${day}/${year}`;
        }

        function parseSceneLength(strip) {
            // Calculate total pages from whole and fraction
            const whole = strip.sceneLengthWhole || 0;
            const fraction = strip.sceneLengthFraction || 0;
            
            // Return as decimal: whole pages + fraction eighths
            return whole + (fraction / 8);
        }

        function formatPages(pages) {
            const whole = Math.floor(pages);
            const fraction = pages - whole;
            
            // Convert fraction to eighths
            const eighths = Math.round(fraction * 8);
            
            // Always display as "WHOLE FRACTION/8"
            return `${whole} ${eighths}/8`;
        }

        // Auto-fit preview pages to viewport (Frame Chart fitS approach)
        function fitPreview() {
            const viewport = document.getElementById('previewViewport');
            const pages = document.querySelectorAll('.previewPage');
            
            if (pages.length === 0) return;
            
            const availW = viewport.clientWidth - 60;
            const availH = viewport.clientHeight - 60;
            const baseW = 1122; // A4 landscape @ 96dpi
            const baseH = 794;
            
            // Calculate scale to fit viewport, max 1.0
            const scale = Math.min(availW / baseW, availH / baseH, 1.0);
            const scaledW = baseW * scale;
            const scaledH = baseH * scale;
            
            // Apply CSS width/height scaling (Frame Chart approach)
            pages.forEach(page => {
                page.style.width = scaledW + 'px';
                page.style.height = scaledH + 'px';
            });
        }

        // Generate pages with content pagination
        function generatePreviewPages() {
            const pages = [];
            const projectName = document.getElementById('projectName').value || 'Untitled Project';
            const activeStrips = strips.filter(s => s.active);
            
            // Constants for pagination (adjusted for 28px margins on all sides)
            const PAGE_HEIGHT = 794 - 56; // 738px usable height (794 - 28px top - 28px bottom)
            const HEADER_HEIGHT = 45; // Project name row
            const ROW_HEIGHT = 42; // Approximate height per strip row
            const CAST_LEGEND_HEIGHT = 45;
            const PAGE_NUMBER_HEIGHT = 20; // Reserve space for page number at bottom
            
            let currentPageContent = [];
            let currentHeight = HEADER_HEIGHT; // Start with header
            
            // Always add project header to first page
            currentPageContent.push({
                type: 'header',
                html: `
                    <tr class="stripboard-row">
                        <td colspan="8" style="background: #808080; color: #fff; text-align: center; padding: 12px; font-weight: bold; height: 40px;">
                            ${projectName}
                        </td>
                    </tr>
                `
            });
            
            // Process each strip
            activeStrips.forEach((strip, index) => {
                const stripHTML = renderStripForPreview(strip);
                const estimatedHeight = ROW_HEIGHT;
                
                // Check if adding this row exceeds page height
                // Reserve space for cast legend on last page and page number
                const isLastStrip = index === activeStrips.length - 1;
                const needsLegendSpace = isLastStrip;
                const heightLimit = needsLegendSpace ? 
                    PAGE_HEIGHT - CAST_LEGEND_HEIGHT - PAGE_NUMBER_HEIGHT : 
                    PAGE_HEIGHT - PAGE_NUMBER_HEIGHT;
                
                if (currentHeight + estimatedHeight > heightLimit) {
                    // Page is full - wrap current page
                    if (strip.type === 'daybreak' || currentPageContent.length > 1) {
                        // Break here (prefer breaking before daybreaks)
                        pages.push(wrapPageHTML(currentPageContent));
                        currentPageContent = [];
                        currentHeight = 0;
                    }
                }
                
                // Add strip to current page
                currentPageContent.push({
                    type: strip.type,
                    html: stripHTML
                });
                currentHeight += estimatedHeight;
            });
            
            // Add cast legend to last page
            const castLegendHTML = generateCastLegend();
            if (castLegendHTML) {
                currentPageContent.push({
                    type: 'legend',
                    html: castLegendHTML
                });
            }
            
            // Push final page
            if (currentPageContent.length > 0) {
                pages.push(wrapPageHTML(currentPageContent));
            }
            
            return pages;
        }

        // Generate cast legend
        function generateCastLegend() {
            const activeStrips = strips.filter(s => s.active);

            activeStrips.forEach(strip => {

            const filteredCastList = castList.filter(c => referencedCastNumbers.has(c.number));

        // ═══════════════════════════════════════════════════════════════════════════
        // DETERMINISTIC LAYOUT ENGINE
        // Phase 1: Core layout computation
        // ═══════════════════════════════════════════════════════════════════════════

        // Geometry constants (all in millimeters)
        const LAYOUT_CONSTANTS = {
            PAGE_WIDTH_MM: 297,
            PAGE_HEIGHT_MM: 210,
            MARGIN_TOP_MM: 12,
            MARGIN_BOTTOM_MM: 12,
            MARGIN_LEFT_MM: 10,
            MARGIN_RIGHT_MM: 10,
            PRINTABLE_WIDTH_MM: 277,  // 297 - 10 - 10
            PRINTABLE_HEIGHT_MM: 186, // 210 - 12 - 12
            STRIP_HEIGHT_MM: 11.05,   // Reduced to 0.65x (was 17mm)
            FONT_SIZE_MM: 2.65,       // Measured: 10px @ 96dpi = 7.5pt
            FONT_SIZE_PT: 7.5,
            FONT_SIZE_LARGE_MM: 3.18, // 1.2x base = 12px @ 96dpi = 9pt
            FONT_SIZE_LARGE_PT: 9,
            FONT_FAMILY: 'Arial, Helvetica, sans-serif'
        };

        // Column widths in millimeters (proportional to current percentages)
        const COLUMN_LAYOUT = {
            SCENE_NUMBER: { widthMm: 13.85, align: 'center' },          // 5%
            INT_EXT_DAYNIGHT: { widthMm: 15.24, align: 'center' },      // 5.5%
            SET_DESCRIPTION: { widthMm: 147, align: 'left' },           // ~53% (adjusted to fit)
            CAST: { widthMm: 27.7, align: 'left' },                     // 10%
            LOCATION: { widthMm: 34.63, align: 'left' },                // 12.5%
            PAGES: { widthMm: 22.16, align: 'center' },                 // 8%
            EST_TIME: { widthMm: 16.62, align: 'center' }               // 6%
        };

        // Compute X positions for each column (cumulative)
        let xCursor = 0;
        const COLUMN_X_POSITIONS = {
            SCENE_NUMBER: xCursor,
            INT_EXT_DAYNIGHT: (xCursor += COLUMN_LAYOUT.SCENE_NUMBER.widthMm),
            SET_DESCRIPTION: (xCursor += COLUMN_LAYOUT.INT_EXT_DAYNIGHT.widthMm),
            CAST: (xCursor += COLUMN_LAYOUT.SET_DESCRIPTION.widthMm),
            LOCATION: (xCursor += COLUMN_LAYOUT.CAST.widthMm),
            PAGES: (xCursor += COLUMN_LAYOUT.LOCATION.widthMm),
            EST_TIME: (xCursor += COLUMN_LAYOUT.PAGES.widthMm)
        };

        /**
         * Main layout computation function
         * Converts stripboard data into deterministic page geometry
         * 
         * @param {Array} stripsData - The strips array from stripboard state
         * @returns {Array} pageLayoutModel - Array of pages with strip geometry
         */
        function computeLayout(stripsData) {
            const pages = [];
            const activeStrips = stripsData.filter(s => s.active);
            const projectName = document.getElementById('projectName').value || 'Untitled Project';
            
            let currentPage = {
                pageNumber: 1,
                strips: [],
                pageNumberElement: null
            };
            
            let yCursor = 0; // Vertical position on current page
            
            // Add project header to page 1
            const headerStrip = createHeaderStrip(projectName, yCursor);
            currentPage.strips.push(headerStrip);
            yCursor += LAYOUT_CONSTANTS.STRIP_HEIGHT_MM;
            
            // Process each active strip
            activeStrips.forEach((strip, index) => {
                // Check if strip fits on current page
                if (yCursor + LAYOUT_CONSTANTS.STRIP_HEIGHT_MM > LAYOUT_CONSTANTS.PRINTABLE_HEIGHT_MM) {
                    // Page full - finalize current page and start new one
                    pages.push(currentPage);
                    
                    currentPage = {
                        pageNumber: pages.length + 1,
                        strips: [],
                        pageNumberElement: null
                    };
                    yCursor = 0;
                }
                
                // Create layout strip from data
                const layoutStrip = createLayoutStrip(strip, yCursor);
                currentPage.strips.push(layoutStrip);
                yCursor += LAYOUT_CONSTANTS.STRIP_HEIGHT_MM;
            });
            
            // Finalize last page
            if (currentPage.strips.length > 0) {
                pages.push(currentPage);
            }
            
            // Add cast legend to last page if there are cast members
            if (pages.length > 0) {
                const castLegend = generateCastLegendStrip(activeStrips);
                if (castLegend) {
                    const lastPage = pages[pages.length - 1];
                    // Check if legend fits on last page
                    const lastStripY = lastPage.strips[lastPage.strips.length - 1].yMm;
                    const nextY = lastStripY + LAYOUT_CONSTANTS.STRIP_HEIGHT_MM;
                    
                    if (nextY + LAYOUT_CONSTANTS.STRIP_HEIGHT_MM <= LAYOUT_CONSTANTS.PRINTABLE_HEIGHT_MM) {
                        // Fits on last page
                        castLegend.yMm = nextY;
                        lastPage.strips.push(castLegend);
                    } else {
                        // Create new page for legend
                        const legendPage = {
                            pageNumber: pages.length + 1,
                            strips: [castLegend],
                            pageNumberElement: null
                        };
                        castLegend.yMm = 0;
                        pages.push(legendPage);
                    }
                }
            }
            
            // Add page numbers AFTER all pages are created so we know total count
            const totalPages = pages.length;
            pages.forEach((page, idx) => {
                addPageNumber(page, idx + 1, totalPages);
            });
            
            // Phase 2: Apply text truncation to all columns
            applyTextTruncation(pages);
            
            return pages;
        }

        /**
         * Generate cast legend strip with multi-line support
         */
        function generateCastLegendStrip(activeStrips) {
            const castList = getCastList();
            const referencedCastNumbers = new Set();
            
            activeStrips.forEach(strip => {
                if (strip.type === 'scene' && strip.cast && Array.isArray(strip.cast)) {
                    strip.cast.forEach(castNum => referencedCastNumbers.add(castNum));
                }
            });
            
            console.log('Cast List from UI:', castList);
            console.log('Referenced Cast Numbers:', Array.from(referencedCastNumbers));
            
            // Validate: find orphaned cast IDs
            const orphanedCastIds = Array.from(referencedCastNumbers).filter(num => 
                !castList.find(c => c.number === num)
            );
            
            // Warn if orphaned IDs found
            if (orphanedCastIds.length > 0) {
                const orphanedList = orphanedCastIds.join(', ');
                console.warn(`⚠️ Strip references undefined cast: ${orphanedList}. Cast will be named automatically.`);
                alert(`⚠️ Warning: Strips reference undefined cast members: ${orphanedList}\n\nThese will be automatically named as "Cast 01", "Cast 02", etc.\n\nYou can edit these names in the Cast Assignment panel.`);
            }
            
            // Auto-populate missing cast members with numbered placeholders
            const enrichedCastList = Array.from(referencedCastNumbers).map(num => {
                const existing = castList.find(c => c.number === num);
                if (existing) {
                    return existing;
                } else {
                    // Create numbered placeholder (Cast 01, Cast 02, etc.)
                    const paddedNum = String(num).padStart(2, '0');
                    return {number: num, name: `Cast ${paddedNum}`};
                }
            });
            
            console.log('Enriched Cast List:', enrichedCastList);
            
            if (enrichedCastList.length === 0) return null;
            
            // Calculate multi-line layout for cast legend
            const castLines = calculateCastLegendLines(enrichedCastList);
            
            // Dynamic height based on number of lines
            const linesCount = castLines.length;
            const legendHeight = LAYOUT_CONSTANTS.STRIP_HEIGHT_MM * Math.max(1, linesCount);
            
            return {
                stripId: 'cast-legend',
                stripType: 'legend',
                xMm: 0,
                yMm: 0, // Will be set by caller
                widthMm: LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM,
                heightMm: legendHeight,
                backgroundColorRgb: [240, 240, 240], // Light grey
                textColorRgb: [0, 0, 0],
                columns: [{
                    columnName: 'cast_legend',
                    xMm: 0,
                    widthMm: LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM,
                    text: castLines.join('\n'), // Multi-line text
                    alignment: 'left',
                    fontSizeMm: LAYOUT_CONSTANTS.FONT_SIZE_MM,
                    fontSizePt: LAYOUT_CONSTANTS.FONT_SIZE_PT,
                    fontWeight: 'bold',
                    useLegendCircles: true // Flag for cast legend circles
                }]
            };
        }

        /**
         * Calculate cast legend text wrapped into multiple lines
         * Accounts for encircled number width + name width + spacing
         * 
         * @param {Array} castList - Array of {number, name} objects
         * @returns {Array} Array of text lines
         */
        function calculateCastLegendLines(castList) {
            const fontSizeMm = LAYOUT_CONSTANTS.FONT_SIZE_MM;
            const printableWidth = LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM;
            
            // Measure "CAST:" label width
            const labelWidthMm = measureTextWidthMm('CAST:', fontSizeMm, 'bold') + 5; // 5mm padding
            
            // Available width for cast entries
            const availableWidth = printableWidth - labelWidthMm - 10; // 10mm right margin for safety
            
            // Circle dimensions (matching renderCastLegendWithCircles)
            const fontSizePx = fontSizeMm * 3.7795;
            const circleDiameterPx = fontSizePx * 1.4;
            const circleDiameterMm = circleDiameterPx / 3.7795;
            
            const lines = [];
            let currentLine = [];
            let currentWidth = 0;
            
            castList.forEach((cast, idx) => {
                // Calculate width for this entry: circle + name + spacing
                const nameWidthMm = measureTextWidthMm(cast.name, fontSizeMm, 'normal');
                const entryWidthMm = circleDiameterMm + 4/3.7795 + nameWidthMm + 15/3.7795; // circle + 4px gap + name + 15px spacing
                
                // Check if adding this entry would overflow
                if (currentLine.length > 0 && currentWidth + entryWidthMm > availableWidth) {
                    // Would overflow - start new line
                    lines.push(currentLine.join('  '));
                    currentLine = [`${cast.number} ${cast.name}`];
                    currentWidth = entryWidthMm;
                } else {
                    // Fits on current line
                    currentLine.push(`${cast.number} ${cast.name}`);
                    currentWidth += entryWidthMm;
                }
            });
            
            // Add final line
            if (currentLine.length > 0) {
                lines.push(currentLine.join('  '));
            }
            
            // Prepend "CAST:" to first line only
            if (lines.length > 0) {
                lines[0] = 'CAST: ' + lines[0];
            }
            
            console.log(`Cast legend: ${castList.length} members wrapped into ${lines.length} lines`);
            
            return lines;
        }

        /**
         * Create header strip layout
         */
        function createHeaderStrip(projectName, yMm) {
            return {
                stripId: 'header',

                xMm: 0,
                yMm: yMm,
                widthMm: LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM,

                backgroundColorRgb: [128, 128, 128],
                textColorRgb: [255, 255, 255],
                columns: [{
                    columnName: 'header',
                    xMm: 0,
                    widthMm: LAYOUT_CONSTANTS.PRINTABLE_WIDTH_MM,
